name: Version & Release

# Releases are driven solely by merging a pull request into main.
#
# Version bump size (semantic versioning) is chosen by PR label:
#   * (no label)      -> patch bump   X.Y.Z -> X.Y.(Z+1)   (default)
#   * release:minor   -> minor bump   X.Y.Z -> X.(Y+1).0
#   * release:major   -> major bump   X.Y.Z -> (X+1).0.0
#
# A single trigger (pull_request: closed) plus a workflow-level concurrency
# group guarantees that two runs can never race to bump/publish the same
# version (the previous push + pull_request dual-trigger caused that race).

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  pull-requests: read

# Serialize releases for this repo so bump/publish steps never overlap.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    # Only run when a PR is actually merged (not merely closed without merging).
    if: github.event.pull_request.merged == true

    outputs:
      new_version: ${{ steps.finalize.outputs.new_version }}
      bump_type: ${{ steps.determine-bump.outputs.bump_type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with latest main
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "Synced to latest main: $(git rev-parse HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install toml package
        run: pip install toml

      - name: Determine bump type from PR labels
        id: determine-bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          # Default is a patch bump. A label overrides it.
          if printf ',%s,' "$LABELS" | grep -q ',release:major,'; then
            BUMP=major
          elif printf ',%s,' "$LABELS" | grep -q ',release:minor,'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP (labels: ${LABELS:-none})"

      - name: Bump version in pyproject.toml
        id: bump
        env:
          BUMP_TYPE: ${{ steps.determine-bump.outputs.bump_type }}
        run: |
          python << 'EOF'
          import os
          import re
          import subprocess
          import toml

          bump_type = os.environ["BUMP_TYPE"]

          with open("pyproject.toml") as f:
              config = toml.load(f)
          current = config["project"]["version"]

          # Detect a manual version change already made inside the merged PR.
          parent = subprocess.run(
              ["git", "show", "HEAD~1:pyproject.toml"],
              capture_output=True, text=True,
          ).stdout
          m = re.search(r'(?m)^version = "([^"]+)"', parent)
          parent_version = m.group(1) if m else ""

          if parent_version and parent_version != current:
              new_version = current
              print(f"Version already changed in PR ({parent_version} -> {current}); skipping auto-bump.")
          else:
              major, minor, patch = map(int, current.split("."))
              if bump_type == "major":
                  major, minor, patch = major + 1, 0, 0
              elif bump_type == "minor":
                  minor, patch = minor + 1, 0
              else:
                  patch += 1
              new_version = f"{major}.{minor}.{patch}"
              config["project"]["version"] = new_version
              with open("pyproject.toml", "w") as f:
                  toml.dump(config, f)
              print(f"Version bumped ({bump_type}): {current} -> {new_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new_version}\n")
          EOF

      - name: Update CHANGELOG.md
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python << 'EOF'
          import os
          import re
          from datetime import datetime

          new_version = os.environ["NEW_VERSION"]
          pr_title = os.environ["PR_TITLE"]
          pr_number = os.environ["PR_NUMBER"]
          today = datetime.now().strftime("%Y-%m-%d")

          with open("CHANGELOG.md", encoding="utf-8") as f:
              changelog = f.read()

          # Idempotent: do nothing if this version is already recorded.
          if f"## [{new_version}]" in changelog:
              print(f"CHANGELOG already has v{new_version}; nothing to do.")
              raise SystemExit(0)

          unreleased_match = re.search(
              r"## \[Unreleased\]\s*\n(.*?)(?=\n## \[)", changelog, re.DOTALL
          )
          unreleased_content = unreleased_match.group(1).strip() if unreleased_match else ""

          if unreleased_content:
              new_entry = f"## [{new_version}] - {today}\n\n{unreleased_content}"
          else:
              entry_type = "Changed"
              low = pr_title.lower()
              if low.startswith("feat"):
                  entry_type = "Added"
              elif low.startswith("fix"):
                  entry_type = "Fixed"
              elif low.startswith("docs"):
                  entry_type = "Documentation"
              elif low.startswith("perf"):
                  entry_type = "Performance"
              elif low.startswith("test"):
                  entry_type = "Testing"
              clean = re.sub(
                  r"^(feat|fix|docs|refactor|perf|test|chore|style|ci)(\(.+?\))?:\s*",
                  "", pr_title, flags=re.IGNORECASE,
              )
              new_entry = f"## [{new_version}] - {today}\n\n### {entry_type}\n\n- {clean} (#{pr_number})"

          if "## [Unreleased]" in changelog:
              changelog = re.sub(
                  r"(## \[Unreleased\])\s*\n.*?(?=\n## \[)",
                  f"\\1\n\n{new_entry}\n",
                  changelog,
                  count=1,
                  flags=re.DOTALL,
              )
          else:
              changelog = changelog.replace("# Changelog", f"# Changelog\n\n{new_entry}", 1)

          with open("CHANGELOG.md", "w", encoding="utf-8") as f:
              f.write(changelog)
          print(f"Added changelog entry for v{new_version}")
          EOF

      - name: Commit version bump
        id: finalize
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: version-bump
    if: needs.version-bump.outputs.new_version != ''

    steps:
      - name: Checkout code (with bumped version)
        uses: actions/checkout@v6.0.2
        with:
          ref: main

      - name: Pull latest (includes version bump commit)
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        # --skip-existing makes re-runs idempotent instead of failing with a 400.
        run: python -m twine upload --skip-existing dist/*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-bump, publish]
    if: needs.version-bump.outputs.new_version != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest
        run: git pull origin main

      - name: Prepare release notes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "## ${PR_TITLE} (#${PR_NUMBER})"
            echo ""
            if [ -n "$PR_BODY" ]; then
              echo "$PR_BODY"
            else
              echo "No detailed description provided."
            fi
          } > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ needs.version-bump.outputs.new_version }}
        # Use the gh CLI (no third-party action, avoids the Node 20 deprecation).
        # Creates the tag on main if it does not already exist; idempotent on re-run.
        run: |
          if gh release view "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "Release v${NEW_VERSION} already exists; skipping."
          else
            gh release create "v${NEW_VERSION}" \
              --target main \
              --title "Release v${NEW_VERSION}" \
              --notes-file release_notes.md
          fi
