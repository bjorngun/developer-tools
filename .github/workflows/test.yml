name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build

  lint:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install pylint
    - name: Run pylint
      run: |
        pylint src/dev_tools/
    - name: Check markdown links
      run: |
        python -m dev_tools.md_link_checker

  test:
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        include:
          - os: ubuntu-latest
            python-version: '3.12'
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Display Python version
      run: python -c "import sys; print(sys.version)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[test]
    - name: Run tests with coverage
      env:
        PYTHONPATH: src
      run: |
        pytest src/tests -v --cov=dev_tools --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5.5.2
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
